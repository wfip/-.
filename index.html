<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم بوارق - القائمة العصرية</title>
    <style>
        :root { --primary: #c0392b; --accent: #27ae60; --bg: #fdfdfd; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 150px; }
        
        .menu-container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
        
        /* تصميم عصري للأزرار */
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .add { background: var(--accent); color: white; }
        .del { background: #f0f0f0; color: #555; }
        
        /* شريط الطلب العائم بشكل أنيق */
        .order-float { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--primary); color: white; padding: 15px 25px; border-radius: 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(192,57,43,0.4); z-index: 1000; }
        .order-btn { background: white; color: var(--primary); border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="menu-container" id="menu"></div>

<!-- شريط الطلب العائم -->
<div class="order-float">
    <span>المجموع: <b id="total">0</b> ر.س</span>
    <button class="order-btn" onclick="send()">إتمام الطلب 🚀</button>
</div>

<script>
    const menu = [
        {n: "مشكل مشويات", p: 45}, {n: "كباب لحم", p: 35}, {n: "شيش طاووق", p: 30},
        {n: "سلطة خضراء", p: 5}, {n: "جريش", p: 10}, {n: "سمبوسة", p: 2}
    ];

    function load() {
        let cont = document.getElementById("menu");
        menu.forEach(item => {
            cont.innerHTML += `<div class="card">
                <div><strong>${item.n}</strong><br><small style="color:#888">${item.p} ر.س</small></div>
                <div>
                    <button class="btn-icon del" onclick="remove(${item.p})">-</button>
                    <button class="btn-icon add" onclick="add(${item.p})">+</button>
                </div>
            </div>`;
        });
    }

    let total = 0;
    function add(p) { total += p; document.getElementById("total").innerText = total; }
    function remove(p) { if(total >= p) total -= p; document.getElementById("total").innerText = total; }

    function send() {
        if(total == 0) return alert("اختر وجباتك أولاً!");
        window.location.href = "https://wa.me/966511025053?text=أريد طلب وجبات من بوارق، المجموع: " + total + " ر.س";
    }
    load();
</script>
</body>
</html>
